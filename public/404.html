<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Pathly App - Wird geladen...</title>
    <script>
      // Single Page Apps for GitHub Pages
      // Store the current path and redirect to index.html
      // index.html will restore the correct URL
      (function() {
        var path = window.location.pathname;
        var search = window.location.search;
        var hash = window.location.hash;
        
        // Keep the base path (/Pathly.app/) and encode the rest
        var segments = path.split('/').filter(function(s) { return s; });
        
        if (segments.length > 1) {
          // e.g. /Pathly.app/auth -> redirect to /Pathly.app/?/auth
          var basePath = '/' + segments[0] + '/';
          var route = segments.slice(1).join('/');
          
          window.location.replace(
            basePath + '?/' + route +
            (search ? '&' + search.slice(1).replace(/&/g, '~and~') : '') +
            hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <p style="font-family: sans-serif; text-align: center; margin-top: 50px;">
      Wird geladen...
    </p>
  </body>
</html>
